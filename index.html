<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>About Me</title>
    <meta
      name="description"
      content="Part portfolio, part personal archive."
    />
    <link rel="canonical" href="https://about.micr.dev/" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://about.micr.dev/" />
    <meta property="og:title" content="About Me" />
    <meta
      property="og:description"
      content="Part portfolio, part personal archive."
    />

    <meta name="theme-color" content="#ffffff" />
    <link rel="icon" type="image/png" href="favicon.png" />


    <!-- Preload your custom font -->
    <link
      rel="preload"
      href="fonts/DecimaMono.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />

    <!-- Your stylesheet -->
    <link rel="stylesheet" href="style.css" />

    <style>
      .mobile-blocker {
        display: none;
      }

      @media (max-width: 768px) {
        .mobile-blocker {
          display: flex;
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          background: white;
          color: black;
          font-family: "Comic Sans MS", cursive, sans-serif;
          font-size: 20px;
          align-items: center;
          justify-content: center;
          text-align: center;
          padding: 20px;
          z-index: 999999;
          max-width: 100%;
          box-sizing: border-box;
          word-wrap: break-word;
          overflow-wrap: break-word;
        }

        .page-rotate,
        .container {
          display: none !important;
        }
      }
    </style>
  </head>
  <body class="is-loading">
    <div class="mobile-blocker">
      soz id rather kms than make my websites responsive on mobile<br /><br />
      come back on desktop ^_^
    </div>

    <div class="page-rotate">
      <div class="container">
        <div class="left-column" id="content" aria-live="polite">
          <div class="skeleton-block skeleton-intro" aria-hidden="true">
            <div class="skeleton-line skeleton-line-wide"></div>
            <div class="skeleton-line skeleton-line-short"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line skeleton-line-wide"></div>
          </div>
          <div class="skeleton-block" aria-hidden="true">
            <div class="skeleton-label"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line skeleton-line-short"></div>
          </div>
          <div class="skeleton-block" aria-hidden="true">
            <div class="skeleton-label"></div>
            <div class="skeleton-grid">
              <div class="skeleton-tile"></div>
              <div class="skeleton-tile"></div>
              <div class="skeleton-tile"></div>
              <div class="skeleton-tile"></div>
              <div class="skeleton-tile"></div>
              <div class="skeleton-tile"></div>
            </div>
          </div>
        </div>

        <div class="right-fixed">
          <div class="hero-wrap">
            <div class="hero-skeleton" aria-hidden="true"></div>
            <img
              src="images/right-image.png"
              alt=""
              aria-hidden="true"
              class="hero-img"
            />
            <a
              href="https://quarzite.micr.dev/"
              target="_blank"
              rel="noopener noreferrer"
              class="masked-link"
              aria-label="Quarzite"
            ></a>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
